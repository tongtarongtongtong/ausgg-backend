<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AUSGG Admin Premium</title><style>
:root{--bg:#07111d;--panel:#0f1d30;--card:#14253c;--line:rgba(255,255,255,.1);--text:#eef6ff;--muted:#8ba2bd;--green:#24f078;--blue:#529dff;--red:#ff4b68;--gold:#ffc44d;--purple:#7b61ff}*{box-sizing:border-box}body{margin:0;background:#07111d;color:var(--text);font-family:Segoe UI,Arial,sans-serif}.login{min-height:100vh;display:flex;align-items:center;justify-content:center}.box{background:#101d30;border:1px solid var(--line);border-radius:18px;padding:28px;width:min(420px,92vw)}input,select,textarea{width:100%;padding:12px;margin:7px 0 13px;border-radius:10px;border:1px solid var(--line);background:#0a1626;color:var(--text)}button{border:0;border-radius:10px;padding:10px 14px;background:#233a5b;color:var(--text);font-weight:800;cursor:pointer}.primary{background:linear-gradient(135deg,var(--green),#6cffaa);color:#03140b}.danger{background:var(--red)}.app{display:none;grid-template-columns:250px 1fr;min-height:100vh}.side{background:#0b1727;border-right:1px solid var(--line);padding:16px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-weight:1000;font-size:20px;color:var(--green);margin-bottom:20px}.nav button{display:block;width:100%;text-align:left;background:transparent;color:var(--muted);margin:3px 0}.nav button:hover,.nav button.active{background:#14253c;color:var(--text)}.main{padding:20px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}.stat{font-size:30px;font-weight:1000;color:var(--green)}.page{display:none}.page.active{display:block}.table{display:grid;gap:10px}.row{background:#0e1b2d;border:1px solid var(--line);border-radius:12px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px}.status{padding:5px 9px;border-radius:999px;background:rgba(255,196,77,.15);color:var(--gold);font-size:12px}.status.approved,.status.completed{background:rgba(36,240,120,.14);color:var(--green)}.status.rejected{background:rgba(255,75,104,.14);color:var(--red)}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(max-width:900px){.app{display:block}.side{height:auto;position:relative}.grid,.two,.three{grid-template-columns:1fr}}
</style></head><body><div class="login" id="login"><div class="box"><h1>🎰 AUSGG Master Admin</h1><p style="color:var(--muted)">Manage users, wallet, support, games, and site layout.</p><input id="masterKey" type="password" placeholder="Master admin key"><button class="primary" onclick="loginAdmin()">Enter Dashboard</button><p id="err" style="color:var(--red)"></p></div></div><div class="app" id="app"><aside class="side"><div class="brand">AUSGG <span style="background:var(--red);padding:3px 7px;border-radius:7px;font-size:11px;color:white">MASTER</span></div><div class="nav"><button class="active" onclick="show('dashboard',this)">📊 Dashboard</button><button onclick="show('users',this)">👥 Users</button><button onclick="show('finance',this)">💳 Finance Requests</button><button onclick="show('support',this)">💬 Live Chat & Requests</button><button onclick="show('games',this)">🎮 Game Manager</button><button onclick="show('settings',this)">⚙️ Site/Wallet Settings</button><button onclick="show('logs',this)">📜 Activity Logs</button></div></aside><main class="main"><div class="top"><h2 id="pageTitle">Dashboard</h2><div><button onclick="refreshAll()">🔄 Refresh Dashboard</button><button onclick="location.reload()">🌐 Refresh Admin</button></div></div><section id="dashboard" class="page active"><div class="grid" id="stats"></div><div class="card"><h3>Notifications</h3><div id="notifs"></div></div></section><section id="users" class="page"><div class="card"><h3>Add Customer</h3><div class="three"><input id="uName" placeholder="Username"><input id="uEmail" placeholder="Email"><input id="uBal" placeholder="Balance" value="1000"></div><button class="primary" onclick="addUser()">Add Customer</button></div><div id="usersList"></div></section><section id="finance" class="page"><div class="two"><div><h3>Deposits</h3><div id="deposits"></div></div><div><h3>Withdrawals</h3><div id="withdrawals"></div></div></div></section><section id="support" class="page"><div class="two"><div class="card"><h3>Chat Messages</h3><div id="chats"></div><textarea id="adminChatText" placeholder="Reply to selected user id manually below"></textarea><input id="chatUserId" placeholder="User ID"><button onclick="sendAdminChat()">Send Reply</button></div><div><h3>Support Requests</h3><div id="supportReqs"></div></div></div></section><section id="games" class="page"><div class="card"><h3>Add / Publish Game</h3><div class="three"><select id="gCat"><option>Slot</option><option>Casino</option><option>Sport</option><option>Egame</option></select><input id="gName" placeholder="Game name"><input id="gThumb" placeholder="Emoji/logo URL" value="🎮"></div><input id="gUrl" placeholder="Playable URL or #internal"><textarea id="gDesc" placeholder="Description"></textarea><button class="primary" onclick="addGame()">Add Game</button></div><div id="gamesList"></div></section><section id="settings" class="page"><div class="two"><div class="card"><h3>Home Layout</h3><input id="brand" placeholder="Brand"><input id="heroTitle" placeholder="Hero title"><textarea id="heroSub" placeholder="Hero subtitle"></textarea><button onclick="saveSettings()">Save Site Layout</button></div><div class="card"><h3>Deposit / Withdraw Settings</h3><input id="depMin" placeholder="Deposit minimum"><textarea id="depInst" placeholder="Deposit instructions"></textarea><input id="wdMin" placeholder="Withdraw minimum"><textarea id="wdInst" placeholder="Withdraw instructions"></textarea><button onclick="saveSettings()">Save Wallet Settings</button></div></div></section><section id="logs" class="page"><div id="logsList"></div></section></main></div><script>
const API_URL=location.hostname.includes('localhost')?'http://localhost:3001':'https://ausgg-backend-production.up.railway.app';let adminKey=localStorage.adminKey||'';function h(){return {'Content-Type':'application/json','x-admin-key':adminKey}}async function loginAdmin(){let r=await fetch(API_URL+'/api/admin/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({masterKey:masterKey.value})});let d=await r.json();if(!r.ok){err.textContent=d.error||'Login failed';return}adminKey=d.adminKey;localStorage.adminKey=adminKey;login.style.display='none';app.style.display='grid';refreshAll()}function show(id,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');pageTitle.textContent=b?b.textContent:'Dashboard';document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active')}async function api(path,opt={}){let r=await fetch(API_URL+path,{...opt,headers:{...h(),...(opt.headers||{})}});return r.json()}async function refreshAll(){let d=await api('/api/admin/dashboard');stats.innerHTML=Object.entries(d).map(([k,v])=>`<div class="card"><small>${k}</small><div class="stat">${v}</div></div>`).join('');let n=await api('/api/admin/notifications');notifs.innerHTML=(n.notifications||[]).slice(0,12).map(x=>`<div class="row"><div>${x.text}<br><small>${new Date(x.at).toLocaleString()}</small></div><span>${x.type}</span></div>`).join('')||'No notifications';loadUsers();loadRequests();loadGames();loadChats();loadLogs();loadSettings()}async function loadUsers(){let d=await api('/api/admin/users');usersList.innerHTML=(d.users||[]).map(u=>`<div class="row"><div><b>${u.username}</b> ${u.playerId}<br>${u.email}</div><div>$${Number(u.balance||0).toFixed(2)}</div></div>`).join('')}async function addUser(){await api('/api/admin/users',{method:'POST',body:JSON.stringify({username:uName.value,email:uEmail.value,balance:uBal.value,password:'123456'})});refreshAll()}function reqHtml(r,type){return `<div class="row"><div><b>${r.id}</b> <span class="status ${r.status}">${r.status}</span><br>${r.username||''} ${r.amount?'$'+r.amount:''}<br>${r.note||r.message||''}${r.adminNote?`<br><b>Note:</b> ${r.adminNote}`:''}</div><div><button onclick="upd('${type}','${r.id}','processing')">Process</button><button class="primary" onclick="upd('${type}','${r.id}','approved')">Approve</button><button onclick="upd('${type}','${r.id}','completed')">Complete</button><button class="danger" onclick="upd('${type}','${r.id}','rejected')">Reject</button></div></div>`}async function loadRequests(){let d=await api('/api/admin/requests');deposits.innerHTML=(d.deposits||[]).map(r=>reqHtml(r,'deposits')).join('')||'No deposits';withdrawals.innerHTML=(d.withdrawals||[]).map(r=>reqHtml(r,'withdrawals')).join('')||'No withdrawals';supportReqs.innerHTML=(d.support||[]).map(r=>reqHtml(r,'support')).join('')||'No support requests'}async function upd(type,id,status){let note=prompt('Admin note (optional)')||'';await api(`/api/admin/${type}/${id}/status`,{method:'POST',body:JSON.stringify({status,adminNote:note})});refreshAll()}async function loadGames(){let d=await api('/api/admin/games');gamesList.innerHTML=(d.games||[]).map(g=>`<div class="row"><div>${g.thumbnail} <b>${g.name}</b><br>${g.category} • ${g.playUrl||'No URL'}<br>${g.description||''}</div><button onclick="delGame('${g.id}')">Delete</button></div>`).join('')||'No games'}async function addGame(){await api('/api/admin/games',{method:'POST',body:JSON.stringify({category:gCat.value,name:gName.value,thumbnail:gThumb.value,playUrl:gUrl.value,description:gDesc.value})});refreshAll()}async function delGame(id){await api('/api/admin/games/'+id,{method:'DELETE'});refreshAll()}async function loadChats(){let d=await api('/api/admin/chats');chats.innerHTML=(d.messages||[]).slice(-50).map(m=>`<div class="row"><div><b>${m.from}</b> ${m.userId}<br>${m.message}</div><button onclick="chatUserId.value='${m.userId}'">Reply</button></div>`).join('')}async function sendAdminChat(){await api('/api/admin/chats/'+chatUserId.value,{method:'POST',body:JSON.stringify({message:adminChatText.value})});adminChatText.value='';loadChats()}async function loadSettings(){let d=await api('/api/admin/settings');brand.value=d.siteConfig?.brand||'';heroTitle.value=d.siteConfig?.heroTitle||'';heroSub.value=d.siteConfig?.heroSub||'';depMin.value=d.depositSettings?.minAmount||10;depInst.value=d.depositSettings?.instructions||'';wdMin.value=d.withdrawSettings?.minAmount||10;wdInst.value=d.withdrawSettings?.instructions||''}async function saveSettings(){await api('/api/admin/settings',{method:'POST',body:JSON.stringify({siteConfig:{brand:brand.value,heroTitle:heroTitle.value,heroSub:heroSub.value},depositSettings:{minAmount:Number(depMin.value),instructions:depInst.value},withdrawSettings:{minAmount:Number(wdMin.value),instructions:wdInst.value}})});alert('Saved');}async function loadLogs(){let d=await api('/api/admin/logs');logsList.innerHTML=(d.logs||[]).map(l=>`<div class="row"><div>${l.action}<br><small>${l.detail||''} ${new Date(l.at).toLocaleString()}</small></div></div>`).join('')||'No logs'}if(adminKey){login.style.display='none';app.style.display='grid';refreshAll()}</script></body></html>
